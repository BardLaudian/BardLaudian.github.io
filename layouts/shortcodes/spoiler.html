<details style="background-color: #161b22; border-left: 4px solid #9FEE00; padding: 1rem; border-radius: 4px; margin: 1rem 0; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
    <summary style="font-weight: bold; color: #9FEE00; outline: none; user-select: none;">
        🕵️‍♂️ {{ with .Get "text" }}{{ . }}{{ else }}Haz clic para revelar el contenido oculto{{ end }}
    </summary>
    <div style="margin-top: 1rem; color: #E2E8F0; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.1);">
        {{ .Inner | markdownify }}
    </div>
</details>
