{{ define "main" }}
<!-- Canvas animado a pantalla completa -->
<canvas id="node-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; opacity: 0.6; pointer-events: none;"></canvas>

<!-- Wrapper de pantalla completa para centrar verticalmente -->
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 160px); padding: 4rem 1rem;">

    <!-- Foto fuera del box, solapando el borde superior -->
    <div style="position: relative; max-width: 640px; width: 100%;">

        <!-- Foto de perfil flotante -->
        {{ with .Site.Params.hero.image }}
            {{ $img := resources.Get . }}
            {{ if $img }}
                <img src="{{ $img.RelPermalink }}" alt="Foto de Perfil"
                    style="position: absolute; top: -48px; left: 50%; transform: translateX(-50%);
                           width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
                           border: 2px solid rgba(159,238,0,0.7);
                           box-shadow: 0 0 20px rgba(159,238,0,0.3);
                           z-index: 10;">
            {{ else }}
                <img src="{{ . | relURL }}" alt="Foto de Perfil"
                    style="position: absolute; top: -48px; left: 50%; transform: translateX(-50%);
                           width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
                           border: 2px solid rgba(159,238,0,0.7);
                           box-shadow: 0 0 20px rgba(159,238,0,0.3);
                           z-index: 10;">
            {{ end }}
        {{ end }}

        <!-- Recuadro central -->
        <div style="background: rgba(15,20,30,0.75); backdrop-filter: blur(16px);
                    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
                    box-shadow: 0 0 40px rgba(0,0,0,0.6);
                    padding: 5rem 3rem 3rem 3rem; text-align: center;">

            <!-- Nombre -->
            <h1 style="font-size: 2.5rem; font-weight: 800; color: #f1f5f9; margin: 0 0 0.75rem 0; letter-spacing: -0.03em; line-height: 1.1;">
                {{ .Site.Params.hero.title }}
            </h1>

            <!-- Subtítulo terminal -->
            <p style="font-family: 'Fira Code', 'Courier New', monospace; font-size: 1rem; color: rgba(159,238,0,0.85); margin: 0 0 1.25rem 0; opacity: 0.9;">
                &gt; {{ .Site.Params.hero.subtitle }} <span style="animation: blink 1s step-end infinite;">_</span>
            </p>

            <!-- Bio corta -->
            <p style="font-size: 0.9rem; color: #64748b; margin: 0 0 2.25rem 0; line-height: 1.6; max-width: 440px;">
                {{ .Site.Params.hero.content }}
            </p>

            <!-- Botones -->
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; margin-bottom: 2rem;">
                <a href="/posts/"
                   style="display: inline-block; padding: 0.75rem 2.5rem;
                          border: 1px solid rgba(159,238,0,0.5); border-radius: 6px;
                          color: rgba(159,238,0,0.9); text-decoration: none; font-weight: 600;
                          background: transparent; transition: all 0.25s ease;
                          box-shadow: 0 0 10px rgba(159,238,0,0.08);"
                   onmouseover="this.style.background='rgba(159,238,0,1)'; this.style.color='#0d1117'; this.style.boxShadow='0 0 25px rgba(159,238,0,0.5)';"
                   onmouseout="this.style.background='transparent'; this.style.color='rgba(159,238,0,0.9)'; this.style.boxShadow='0 0 10px rgba(159,238,0,0.08)';">
                    Writeups
                </a>
                <a href="/reports/"
                   style="display: inline-block; padding: 0.75rem 2.5rem;
                          border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
                          color: #94a3b8; text-decoration: none; font-weight: 600;
                          background: rgba(255,255,255,0.04); transition: all 0.25s ease;"
                   onmouseover="this.style.borderColor='rgba(255,255,255,0.4)'; this.style.color='#f1f5f9';"
                   onmouseout="this.style.borderColor='rgba(255,255,255,0.15)'; this.style.color='#94a3b8';">
                    Informes Profesionales
                </a>
            </div>

            <!-- Enlace "Sobre mí" -->
            <a href="/about/"
               style="font-size: 0.8rem; color: #475569; text-decoration: underline;
                      text-underline-offset: 4px; transition: color 0.2s ease;"
               onmouseover="this.style.color='rgba(159,238,0,0.8)';"
               onmouseout="this.style.color='#475569';">
                Saber más sobre mí
            </a>
        </div>

    </div>
</div>

<style>
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
@keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 15px rgba(159,238,0,0.25); }
    50% { box-shadow: 0 0 30px rgba(159,238,0,0.5); }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const canvas = document.getElementById("node-canvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");

    let W = window.innerWidth, H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    window.addEventListener("resize", () => {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W; canvas.height = H;
    });

    const DIST = 160, N = W < 768 ? 45 : 95;
    const particles = Array.from({ length: N }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.45,
        vy: (Math.random() - 0.5) * 0.45,
        r: Math.random() * 1.5 + 0.5
    }));

    function draw() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < N; i++) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > W) p.vx *= -1;
            if (p.y < 0 || p.y > H) p.vy *= -1;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(159,238,0,0.45)";
            ctx.fill();
            for (let j = i + 1; j < N; j++) {
                const q = particles[j];
                const d = Math.hypot(p.x - q.x, p.y - q.y);
                if (d < DIST) {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
                    ctx.strokeStyle = `rgba(159,238,0,${(1 - d / DIST) * 0.22})`;
                    ctx.lineWidth = 0.7;
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(draw);
    }
    draw();
});
</script>
{{ end }}
