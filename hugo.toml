# --- CONFIGURACIÓN BÁSICA ---
baseURL = "https://BardLaudian.github.io/"
languageCode = "es-es"
title = "BardLaudian | Pentester Journey"
theme = "blowfish"

# --- PARÁMETROS DEL TEMA (EL "LOOK") ---
[params]
    colorScheme = "ocean"         # Fondo negro profundo – máxima legibilidad
    defaultAppearance = "dark"   # Modo oscuro por defecto
    showSunMoon = true           # Botón para cambiar entre modo claro/oscuro
    showScrollToTop = true       # Flecha para volver arriba
    enableSearch = true          # Buscador interno (muy útil para tus notas)
    showReadingTime = true       # Mostrar tiempo de lectura
    showBreadcrumbs = true       # Mostrar migas de pan
    showTaxonomies = true        # Mostrar tags y categorías
    
# --- CONFIGURACIÓN DE LA PORTADA (HOMEPAGE) ---
[params.homepage]
    layout = "profile"        # Estilo perfil profesional
    showRecent = true         # Mostrar posts recientes debajo
    showRecentItems = 3       # Solo los 3 últimos para que no sature
    showContact = true        # Iconos de contacto visibles
    cardView = true           # Los posts se verán como tarjetas modernas

# Vistas de listado de artículos
[params.list]
    groupByYear = true
    cardView = true           # Tarjetas en vez de lista plana

[params.hero]
    # Esto es lo que sale en grande al entrar
    title = "Pablo Seoane Temprano"
    subtitle = "Junior Pentester | Aspirante a CPTS de Hack The Box"
    content = "Estudiante de Ingeniería Robótica apasionado por la ciberseguridad ofensiva. Mi enfoque: entender el sistema para saber cómo protegerlo."
    image = "img/perfil.jpg"  # Asegúrate de tener tu foto en assets/img/perfil.jpg

# --- TU IDENTIDAD (AUTOR) ---
[author]
    name = "BardLaudian"        # Pon aquí tu nombre real o alias
    image = "img/perfil.jpg"     # Tu foto en assets/img/perfil.jpg
    headline = "Junior Pentester en formación | Aspirante a CPTS"
    bio = "Apasionado del Hacking Ético basado en A Coruña. Documentando mi proceso de certificación CPTS y mis peleas con máquinas de Hack The Box."
    
    # Redes sociales (Blowfish usa iconos automáticos)
    links = [
        { linkedin = "https://linkedin.com/in/pablo-seoane-temprano" },
        { github = "https://github.com/BardLaudian" },
        { hackthebox = "https://app.hackthebox.com/users/tu-id-de-htb" },
    ]

# --- MENÚ DE NAVEGACIÓN ---
[[menu.main]]
    name = "Writeups"
    url = "/posts/"              # Donde irán tus máquinas de HTB
    weight = 10


[[menu.main]]
    name = "Sobre mí"
    url = "/about/"
    weight = 30

# --- CONFIGURACIÓN DE CONTENIDO ---
[markup.goldmark.renderer]
    unsafe = true                # Permite usar HTML en tu Markdown (necesario para algunas funciones)

[taxonomies]
    category = "categories"
    tag = "tags"
    series = "series"

[outputs]
    home = ["HTML", "RSS", "JSON"] # Necesario para el buscador